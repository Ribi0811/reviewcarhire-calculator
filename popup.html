<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewCarHire - Car Rental Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; width: 360px; background: #f8f9fa; }
  .header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 16px; text-align: center; }
  .header h1 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 11px; opacity: 0.9; }
  .calc { padding: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
  .field input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
  .field input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
  .result { background: linear-gradient(135deg, #fef3c7, #fde68a); border-radius: 8px; padding: 14px; text-align: center; margin-top: 12px; display: none; }
  .result.show { display: block; }
  .result .amount { font-size: 24px; font-weight: 800; color: #b45309; }
  .result .label { font-size: 10px; color: #92400e; margin-top: 2px; }
  .btn { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #1d4ed8; }
  .cta { background: white; padding: 12px 16px; border-top: 1px solid #e5e7eb; text-align: center; }
  .cta a { font-size: 12px; color: #2563eb; text-decoration: none; font-weight: 600; }
  .cta a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1>ReviewCarHire - Car Rental Calculator</h1>
  <p>How much are missed calls costing your business?</p>
</div>

<div class="calc">
  <div class="field">
    <label>Calls missed per week</label>
    <input type="number" id="calls" value="10" min="0">
  </div>
  <div class="field">
    <label>Average job value ($)</label>
    <input type="number" id="value" value="300" min="0">
  </div>
  <div class="field">
    <label>Conversion rate (%)</label>
    <input type="number" id="rate" value="30" min="1" max="100">
  </div>

  <div class="result" id="result">
    <div class="amount" id="amount">$0</div>
    <div class="label">lost per year to missed calls</div>
  </div>

  <button class="btn" onclick="calculate()">Calculate Loss</button>
</div>

<div class="cta">
  Stop losing revenue —
  <a href="https://reviewcarhire.com" target="_blank">get an AI receptionist</a>
</div>

<script>
function calculate() {
  const calls = parseFloat(document.getElementById('calls').value) || 0;
  const value = parseFloat(document.getElementById('value').value) || 0;
  const rate = parseFloat(document.getElementById('rate').value) || 1;
  const yearly = calls * value * (rate / 100) * 52;
  const formatted = yearly >= 1000000
    ? '$' + (yearly / 1000000).toFixed(1) + 'M'
    : '$' + Math.round(yearly).toLocaleString();
  document.getElementById('amount').textContent = formatted;
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
